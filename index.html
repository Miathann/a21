      navItem: (active) => ({ display: "flex", alignItems: "center", gap: "10px", padding: "10px 12px", borderRadius: "8px", cursor: "pointer", fontSize: "14px", fontWeight: active ? "600" : "400", background: active ? "rgba(224,123,175,0.15)" : "transparent", color: active ? colors.accent : "rgba(255,255,255,0.7)", marginBottom: "2px" }),
      main: { marginLeft: "240px", flex: 1, minHeight: "100vh" },
      header: { background: colors.bgCard, borderBottom: `1px solid ${colors.border}`, padding: "16px 32px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 50 },
      headerTitle: { fontSize: "20px", fontWeight: "600", color: colors.text },
      headerActions: { display: "flex", alignItems: "center", gap: "12px" },
      content: { padding: "32px", maxWidth: "1400px" },
      card: { background: colors.bgCard, borderRadius: "12px", border: `1px solid ${colors.border}`, padding: "24px", marginBottom: "24px" },
      cardHeader: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "20px" },
      cardTitle: { fontSize: "16px", fontWeight: "600", color: colors.text },
      button: (variant = "primary") => ({ display: "inline-flex", alignItems: "center", gap: "8px", padding: variant === "sm" ? "8px 14px" : "12px 20px", borderRadius: "8px", border: variant === "secondary" ? `1px solid ${colors.border}` : "none", fontSize: variant === "sm" ? "13px" : "14px", fontWeight: "600", cursor: "pointer", background: variant === "primary" || variant === "sm" ? colors.accent : colors.bgCard, color: variant === "primary" || variant === "sm" ? "#fff" : colors.text }),
      input: { width: "100%", padding: "10px 14px", borderRadius: "8px", border: `1px solid ${colors.border}`, fontSize: "14px", color: colors.text, background: colors.bgCard, outline: "none" },
      select: { width: "100%", padding: "10px 14px", borderRadius: "8px", border: `1px solid ${colors.border}`, fontSize: "14px", color: colors.text, background: colors.bgCard, cursor: "pointer" },
      textarea: { width: "100%", padding: "10px 14px", borderRadius: "8px", border: `1px solid ${colors.border}`, fontSize: "14px", color: colors.text, background: colors.bgCard, resize: "vertical", minHeight: "80px", fontFamily: "inherit" },
      label: { display: "block", fontSize: "13px", fontWeight: "500", color: colors.textMuted, marginBottom: "6px" },
      badge: (color = colors.accent) => ({ display: "inline-flex", alignItems: "center", padding: "4px 10px", borderRadius: "20px", fontSize: "12px", fontWeight: "500", background: `${color}15`, color: color }),
      metric: { textAlign: "center", padding: "20px" },
      metricValue: { fontSize: "32px", fontWeight: "700", color: colors.primary, marginBottom: "4px" },
      metricLabel: { fontSize: "13px", color: colors.textMuted },
      grid2: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px" },
      grid3: { display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "16px" },
      grid4: { display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "16px" },
    };

    // ============================================================
    // MAIN COMPONENT
    // ============================================================
    function A21Platform() {
      const [currentPage, setCurrentPage] = useState("dashboard");
      const [currentSubPage, setCurrentSubPage] = useState(null);
      const [showOnboarding, setShowOnboarding] = useState(true);
      const [qualifiers, setQualifiers] = useState([]);
      const [qualifierData, setQualifierData] = useState({});
      const [selectedPropertyId, setSelectedPropertyId] = useState("");
      const [selectedProperty, setSelectedProperty] = useState(null);
      const [selectedPlaybook, setSelectedPlaybook] = useState("ethos");
      const [propertyFilter, setPropertyFilter] = useState("all");
      const [isGenerating, setIsGenerating] = useState(false);
      const [strategyOutput, setStrategyOutput] = useState("");
      const [proposalOutput, setProposalOutput] = useState("");
      const [emailOutput, setEmailOutput] = useState("");

      const navigate = (page, subPage = null) => {
        setCurrentPage(page);
        setCurrentSubPage(subPage);
        if (page === "qualifier" && subPage === "new") {
          setQualifierData({});
          setSelectedPropertyId("");
          setStrategyOutput("");
          setProposalOutput("");
        }
      };

      const handleQualifierChange = (id, value) => {
        setQualifierData(prev => ({ ...prev, [id]: value }));
      };

      const saveQualifier = () => {
        const newQualifier = { id: Date.now(), ...qualifierData, propertyId: selectedPropertyId, createdAt: new Date().toISOString() };
        setQualifiers(prev => [newQualifier, ...prev]);
        return newQualifier;
      };

      // ============================================================
      // TEMPLATE-BASED STRATEGY ENGINE
      // ============================================================
      const ACTIVATION_TEMPLATES = {
        "Spirits & Wine": [
          "**Signature Tasting Experience**: Create an exclusive tasting lounge with guided tastings led by your brand ambassador.",
          "**Cocktail Garden Activation**: Transform a section into an immersive cocktail garden with live mixologists.",
          "**Master Class Series**: Host intimate seminars where guests learn the craft behind your product.",
        ],
        "Financial Services": [
          "**Cardholder Lounge**: Create an exclusive retreat with premium seating and priority access.",
          "**VIP Experience Presenting**: Sponsor the festival's most coveted experiences.",
          "**Business Networking Reception**: Host an intimate gathering for entrepreneurs and executives.",
        ],
        "Automotive": [
          "**Ride & Drive Experience**: Position vehicles at the festival entrance for test drives.",
          "**Chef Shuttle Partnership**: Transport celebrity chefs in your vehicles for organic content moments.",
          "**Luxury Lounge Display**: Showcase the latest models in a premium lounge environment.",
        ],
        "default": [
          "**Brand Experience Zone**: Create an immersive activation space that brings your brand story to life.",
          "**Presenting Partner**: Align with a signature festival event for naming rights and visibility.",
          "**VIP Access Sponsor**: Own the VIP experience, connecting with the festival's most valuable attendees.",
        ],
      };

      const getRecommendedProperties = () => {
        const recommendations = [];
        const budget = qualifierData.budget || "";
        const category = qualifierData.category || "";
        const geography = qualifierData.geography || "";

        let targetTiers = [1, 2, 3, 4];
        if (budget.includes("Under $15,000") || budget.includes("$15,000–$25,000")) targetTiers = [3, 4];
        else if (budget.includes("$100,000") || budget.includes("$250,000")) targetTiers = [1, 2];

        const geoMatches = {
          "Southeast region": ["sobewff", "atlantafw"],
          "Northeast region": ["nycwff"],
          "West Coast": ["pebblebeach"],
          "Caribbean / International": ["bahamas"],
          "Multi-market / touring": ["tours"],
          "National reach": ["sobewff", "nycwff", "tours"],
        };

        Object.values(PROPERTIES).forEach(prop => {
          let score = 0;
          let reasons = [];

          if (targetTiers.includes(prop.tier)) { score += 2; reasons.push(`Budget aligns with ${prop.tierName}`); }
          if (geography && geoMatches[geography]?.includes(prop.id)) { score += 3; reasons.push(`Matches ${geography}`); }
          if (category && prop.bestFitCategories.some(c => c.toLowerCase().includes(category.split(" /")[0].toLowerCase()))) {
            score += 3; reasons.push(`${category} is a best-fit category`);
          }

          if (score > 0) recommendations.push({ property: prop, score, reasons });
        });

        return recommendations.sort((a, b) => b.score - a.score).slice(0, 3);
      };

      const generateStrategy = () => {
        setIsGenerating(true);
        setStrategyOutput("");
        setProposalOutput("");

        setTimeout(() => {
          const prop = selectedPropertyId ? PROPERTIES[selectedPropertyId] : null;
          const recommendations = getRecommendedProperties();
          const activations = ACTIVATION_TEMPLATES[qualifierData.category] || ACTIVATION_TEMPLATES["default"];
          const company = qualifierData.company || "[BRAND]";

          let strategy = `## Property Recommendation\n\n`;
          if (prop) {
            strategy += `**${prop.name}** is an excellent fit for ${company}.\n\n`;
            strategy += `→ **Why here:** ${prop.whyHere}\n\n`;
            strategy += `→ **Audience:** ${prop.audience}\n\n`;
          } else if (recommendations.length > 0) {
            strategy += `Based on your inputs, here are top recommendations for ${company}:\n\n`;
            recommendations.forEach((rec, i) => {
              strategy += `**${i + 1}. ${rec.property.name}** (${rec.property.tierName})\n`;
              strategy += `→ ${rec.reasons.join(" • ")}\n`;
              strategy += `→ ${rec.property.attendees} attendees | ${rec.property.market}\n\n`;
            });
          }

          strategy += `## Activation Concepts\n\n`;
          activations.forEach(a => { strategy += a.replace(/\[BRAND\]/g, company) + "\n\n"; });

          const targetProp = prop || recommendations[0]?.property || PROPERTIES.sobewff;
          strategy += `## Recommended Inventory\n\n`;
          targetProp.keyInventory.slice(0, 4).forEach(item => { strategy += `→ **${item}**\n`; });
          strategy += `\n**Pricing:** ${targetProp.inventory}\n`;

          setStrategyOutput(strategy);

          let proposal = `## Opening Hook\n\n`;
          proposal += `"${company} isn't just about ${qualifierData.product || "what you sell"} — it's about [specific brand value]. ${targetProp.name} is where that story comes to life."\n\n`;
          proposal += `## Key Benefits\n\n1. **Audience Quality**: ${targetProp.audience}\n2. **Scale & Reach**: ${targetProp.scale}\n\n`;
          proposal += `## Subject Lines\n\n1. "${targetProp.shortName} + ${company} — quick thought"\n2. "Partnership opportunity at ${targetProp.shortName}"`;

          setProposalOutput(proposal);
          setIsGenerating(false);
        }, 800);
      };

      const generateEmail = () => {
        setIsGenerating(true);
        setTimeout(() => {
          const prop = selectedPropertyId ? PROPERTIES[selectedPropertyId] : PROPERTIES.sobewff;
          const company = qualifierData.company || "[BRAND]";
          setEmailOutput(`Subject: ${prop.shortName} + ${company} — quick thought\n\nHi [Contact],\n\nI've been thinking about ${company}'s positioning, and I wanted to share an idea.\n\n${prop.name} is coming up ${prop.dates}, and there's a natural fit I'd love to explore. The festival draws ${prop.attendees} — exactly the audience that ${company} resonates with.\n\nWould you have 20 minutes this week to walk through a specific activation concept?\n\nBest,\nAnthony Gordon`);
          setIsGenerating(false);
        }, 500);
      };

      const formatMarkdown = (text) => {
        if (!text) return "";
        return text
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/^## (.*$)/gm, `<h3 style="color:${colors.primary};margin:24px 0 12px;font-size:16px;font-weight:600;">$1</h3>`)
          .replace(/^→ (.*$)/gm, `<div style="display:flex;gap:10px;margin:8px 0;"><span style="color:${colors.accent};">→</span><span>$1</span></div>`)
          .replace(/^\d+\. (.*$)/gm, `<div style="margin:8px 0;">$1</div>`)
          .replace(/\n\n/g, '<br/><br/>').replace(/\n/g, '<br/>');
      };

      // ============================================================
      // RENDER: SIDEBAR
      // ============================================================
      const renderSidebar = () => (
        <div style={styles.sidebar}>
          <div style={styles.sidebarLogo}>
            <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
              <div style={{ width: "36px", height: "36px", borderRadius: "8px", background: `linear-gradient(135deg, ${colors.accent}, #fff)`, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: "800", fontSize: "16px", color: colors.primary }}>a21</div>
              <div>
                <div style={styles.logoText}>Partnerships</div>
                <div style={styles.logoSubtext}>Internal Platform</div>
              </div>
            </div>
          </div>
          
          <nav style={styles.nav}>
            <div style={styles.navSection}>
              <div style={styles.navLabel}>Main</div>
              <div style={styles.navItem(currentPage === "dashboard")} onClick={() => navigate("dashboard")}><Icons.Home /> Dashboard</div>
              <div style={styles.navItem(currentPage === "qualifier")} onClick={() => navigate("qualifier")}><Icons.Clipboard /> Qualifier</div>
              <div style={styles.navItem(currentPage === "strategy")} onClick={() => navigate("strategy")}><Icons.Brain /> Strategy Engine</div>
              <div style={styles.navItem(currentPage === "proposals")} onClick={() => navigate("proposals")}><Icons.FileText /> Proposals</div>
            </div>
            <div style={styles.navSection}>
              <div style={styles.navLabel}>Reference</div>
              <div style={styles.navItem(currentPage === "properties")} onClick={() => navigate("properties")}><Icons.Grid /> Properties</div>
              <div style={styles.navItem(currentPage === "playbooks")} onClick={() => navigate("playbooks")}><Icons.Book /> Playbooks</div>
            </div>
            <div style={styles.navSection}>
              <div style={styles.navLabel}>System</div>
              <div style={styles.navItem(currentPage === "admin")} onClick={() => navigate("admin")}><Icons.Settings /> Admin</div>
            </div>
          </nav>
          
          <div style={{ padding: "16px", borderTop: "1px solid rgba(255,255,255,0.1)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
              <div style={{ width: "32px", height: "32px", borderRadius: "50%", background: colors.accent, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "13px", fontWeight: "600", color: "#fff" }}>AG</div>
              <div>
                <div style={{ fontSize: "13px", fontWeight: "500" }}>Anthony Gordon</div>
                <div style={{ fontSize: "11px", color: "rgba(255,255,255,0.5)" }}>VP Partnerships</div>
              </div>
            </div>
          </div>
        </div>
      );

      // ============================================================
      // RENDER: DASHBOARD
      // ============================================================
      const renderDashboard = () => {
        const dealsByStage = {
          Lead: SAMPLE_DEALS.filter(d => d.stage === "Lead"),
          Qualified: SAMPLE_DEALS.filter(d => d.stage === "Qualified"),
          "Proposal Sent": SAMPLE_DEALS.filter(d => d.stage === "Proposal Sent"),
          Negotiation: SAMPLE_DEALS.filter(d => d.stage === "Negotiation"),
          "Closed Won": SAMPLE_DEALS.filter(d => d.stage === "Closed Won"),
        };
        const totalPipeline = SAMPLE_DEALS.filter(d => d.stage !== "Closed Won").reduce((sum, d) => sum + d.value, 0);
        const closedValue = SAMPLE_DEALS.filter(d => d.stage === "Closed Won").reduce((sum, d) => sum + d.value, 0);

        return (
          <>
            <div style={styles.header}>
              <h1 style={styles.headerTitle}>Dashboard</h1>
              <div style={styles.headerActions}>
                <button style={styles.button("primary")} onClick={() => navigate("qualifier", "new")}><Icons.Plus /> New Qualifier</button>
              </div>
            </div>
            
            <div style={styles.content}>
              <div style={{ ...styles.grid4, marginBottom: "24px" }}>
                <div style={styles.card}><div style={styles.metric}><div style={styles.metricValue}>${(totalPipeline / 1000).toFixed(0)}K</div><div style={styles.metricLabel}>Active Pipeline</div></div></div>
                <div style={styles.card}><div style={styles.metric}><div style={{ ...styles.metricValue, color: colors.success }}>${(closedValue / 1000).toFixed(0)}K</div><div style={styles.metricLabel}>Closed This Quarter</div></div></div>
                <div style={styles.card}><div style={styles.metric}><div style={styles.metricValue}>{SAMPLE_DEALS.length}</div><div style={styles.metricLabel}>Active Deals</div></div></div>
                <div style={styles.card}><div style={styles.metric}><div style={styles.metricValue}>{qualifiers.length}</div><div style={styles.metricLabel}>Qualifiers</div></div></div>
              </div>

              <div style={styles.card}>
                <div style={styles.cardHeader}><h2 style={styles.cardTitle}>Pipeline by Stage</h2></div>
                <div style={{ display: "flex", gap: "16px", overflowX: "auto", paddingBottom: "8px" }}>
                  {Object.entries(dealsByStage).map(([stage, deals]) => (
                    <div key={stage} style={{ flex: "0 0 200px", background: colors.bg, borderRadius: "10px", padding: "16px" }}>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "12px" }}>
                        <span style={{ fontSize: "13px", fontWeight: "600", color: colors.text }}>{stage}</span>
                        <span style={styles.badge(stage === "Closed Won" ? colors.success : colors.accent)}>{deals.length}</span>
                      </div>
                      {deals.map(deal => (
                        <div key={deal.id} style={{ background: colors.bgCard, borderRadius: "8px", padding: "12px", marginBottom: "8px", border: `1px solid ${colors.border}` }}>
                          <div style={{ fontSize: "14px", fontWeight: "500", color: colors.text, marginBottom: "4px" }}>{deal.company}</div>
                          <div style={{ fontSize: "12px", color: colors.textMuted, marginBottom: "6px" }}>{deal.property}</div>
                          <div style={{ display: "flex", justifyContent: "space-between" }}>
                            <span style={{ fontSize: "13px", fontWeight: "600", color: colors.primary }}>${(deal.value / 1000).toFixed(0)}K</span>
                            <span style={{ fontSize: "11px", color: colors.textLight }}>{deal.seller}</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              </div>

              <div style={styles.grid2}>
                <div style={styles.card}>
                  <div style={styles.cardHeader}><h2 style={styles.cardTitle}>Quick Actions</h2></div>
                  <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                    <button style={{ ...styles.button("secondary"), justifyContent: "flex-start", width: "100%" }} onClick={() => navigate("qualifier", "new")}><Icons.Clipboard /> Start New Qualifier</button>
                    <button style={{ ...styles.button("secondary"), justifyContent: "flex-start", width: "100%" }} onClick={() => navigate("properties")}><Icons.Grid /> Browse Properties</button>
                    <button style={{ ...styles.button("secondary"), justifyContent: "flex-start", width: "100%" }} onClick={() => navigate("playbooks")}><Icons.Book /> Review Playbooks</button>
                  </div>
                </div>
                <div style={styles.card}>
                  <div style={styles.cardHeader}><h2 style={styles.cardTitle}>Recent Activity</h2></div>
                  <div style={{ fontSize: "13px", color: colors.textMuted }}>
                    {qualifiers.length > 0 ? qualifiers.slice(0, 5).map((q, i) => (
                      <div key={i} style={{ padding: "8px 0", borderBottom: i < 4 ? `1px solid ${colors.borderLight}` : "none" }}>
                        <span style={{ fontWeight: "500", color: colors.text }}>{q.company || "New Lead"}</span>
                        <span style={{ marginLeft: "8px", color: colors.textLight }}>Qualifier created</span>
                      </div>
                    )) : <div style={{ padding: "20px", textAlign: "center", color: colors.textLight }}>No recent activity</div>}
                  </div>
                </div>
              </div>
            </div>
          </>
        );
      };

      // ============================================================
      // RENDER: QUALIFIER
      // ============================================================
      const renderQualifier = () => {
        if (currentSubPage === "new" || currentSubPage === "edit") {
          return (
            <>
              <div style={styles.header}>
                <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                  <button style={{ ...styles.button("secondary"), padding: "8px" }} onClick={() => navigate("qualifier")}><Icons.ArrowLeft /></button>
                  <h1 style={styles.headerTitle}>New Qualifier</h1>
                </div>
                <div style={styles.headerActions}>
                  <button style={styles.button("secondary")} onClick={() => { saveQualifier(); navigate("qualifier"); }}>Save Draft</button>
                  <button style={styles.button("primary")} onClick={() => { saveQualifier(); navigate("strategy"); }} disabled={!qualifierData.company}><Icons.Zap /> Generate Strategy</button>
                </div>
              </div>
              
              <div style={styles.content}>
                <div style={{ ...styles.card, borderColor: colors.accent, borderWidth: "2px" }}>
                  <label style={{ ...styles.label, color: colors.accent, textTransform: "uppercase" }}>Target Property (optional)</label>
                  <select value={selectedPropertyId} onChange={e => setSelectedPropertyId(e.target.value)} style={styles.select}>
                    <option value="">🔍 Auto-recommend the best property fit</option>
                    {Object.values(PROPERTIES).sort((a, b) => a.tier - b.tier).map(p => (
                      <option key={p.id} value={p.id}>{p.emoji} {p.name} — {p.tierName}</option>
                    ))}
                  </select>
                </div>

                {QUALIFIER_FIELDS.map(section => (
                  <div key={section.section} style={styles.card}>
                    <h3 style={{ fontSize: "12px", fontWeight: "600", color: colors.accent, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "20px" }}>{section.section}</h3>
                    <div style={styles.grid2}>
                      {section.fields.map(field => (
                        <div key={field.id} style={{ gridColumn: field.type === "textarea" ? "span 2" : "span 1" }}>
                          <label style={styles.label}>{field.label}</label>
                          {field.type === "text" && <input type="text" placeholder={field.placeholder} value={qualifierData[field.id] || ""} onChange={e => handleQualifierChange(field.id, e.target.value)} style={styles.input} />}
                          {field.type === "select" && <select value={qualifierData[field.id] || ""} onChange={e => handleQualifierChange(field.id, e.target.value)} style={styles.select}><option value="">Select...</option>{field.options.map(o => <option key={o} value={o}>{o}</option>)}</select>}
                          {field.type === "textarea" && <textarea placeholder={field.placeholder} value={qualifierData[field.id] || ""} onChange={e => handleQualifierChange(field.id, e.target.value)} style={styles.textarea} />}
                        </div>
                      ))}
                    </div>
                  </div>
                ))}

                <div style={{ textAlign: "center", padding: "20px 0" }}>
                  <button style={{ ...styles.button("primary"), padding: "16px 48px", fontSize: "16px", boxShadow: `0 4px 24px ${colors.accent}40` }} onClick={() => { saveQualifier(); navigate("strategy"); }} disabled={!qualifierData.company}><Icons.Sparkles /> Generate Strategy & Proposal</button>
                </div>
              </div>
            </>
          );
        }
        
        return (
          <>
            <div style={styles.header}>
              <h1 style={styles.headerTitle}>Qualifiers</h1>
              <div style={styles.headerActions}><button style={styles.button("primary")} onClick={() => navigate("qualifier", "new")}><Icons.Plus /> New Qualifier</button></div>
            </div>
            <div style={styles.content}>
              {qualifiers.length === 0 ? (
                <div style={{ ...styles.card, textAlign: "center", padding: "60px" }}>
                  <div style={{ fontSize: "48px", marginBottom: "16px" }}>📋</div>
                  <h2 style={{ fontSize: "18px", fontWeight: "600", color: colors.text, marginBottom: "8px" }}>No Qualifiers Yet</h2>
                  <p style={{ color: colors.textMuted, marginBottom: "20px" }}>Start by creating your first qualifier after a discovery call.</p>
                  <button style={styles.button("primary")} onClick={() => navigate("qualifier", "new")}><Icons.Plus /> Create First Qualifier</button>
                </div>
              ) : (
                <div style={styles.card}>
                  <table style={{ width: "100%", borderCollapse: "collapse" }}>
                    <thead><tr style={{ borderBottom: `1px solid ${colors.border}` }}>
                      <th style={{ padding: "12px", textAlign: "left", fontSize: "12px", fontWeight: "600", color: colors.textMuted, textTransform: "uppercase" }}>Company</th>
                      <th style={{ padding: "12px", textAlign: "left", fontSize: "12px", fontWeight: "600", color: colors.textMuted, textTransform: "uppercase" }}>Category</th>
                      <th style={{ padding: "12px", textAlign: "left", fontSize: "12px", fontWeight: "600", color: colors.textMuted, textTransform: "uppercase" }}>Property</th>
                      <th style={{ padding: "12px", textAlign: "left", fontSize: "12px", fontWeight: "600", color: colors.textMuted, textTransform: "uppercase" }}>Created</th>
                    </tr></thead>
                    <tbody>
                      {qualifiers.map((q, i) => (
                        <tr key={i} style={{ borderBottom: `1px solid ${colors.borderLight}`, cursor: "pointer" }} onClick={() => { setQualifierData(q); setSelectedPropertyId(q.propertyId || ""); navigate("qualifier", "edit"); }}>
                          <td style={{ padding: "12px", fontSize: "14px", fontWeight: "500", color: colors.text }}>{q.company || "—"}</td>
                          <td style={{ padding: "12px", fontSize: "14px", color: colors.textMuted }}>{q.category || "—"}</td>
                          <td style={{ padding: "12px", fontSize: "14px", color: colors.textMuted }}>{q.propertyId ? PROPERTIES[q.propertyId]?.shortName : "TBD"}</td>
                          <td style={{ padding: "12px", fontSize: "14px", color: colors.textLight }}>{new Date(q.createdAt).toLocaleDateString()}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </>
        );
      };

      // ============================================================
      // RENDER: STRATEGY ENGINE
      // ============================================================
      const renderStrategy = () => (
        <>
          <div style={styles.header}>
            <h1 style={styles.headerTitle}>Strategy Engine</h1>
            <div style={styles.headerActions}>
              {strategyOutput && <button style={styles.button("secondary")} onClick={generateStrategy} disabled={isGenerating}><Icons.Sparkles /> Regenerate</button>}
            </div>
          </div>
          
          <div style={styles.content}>
            {!strategyOutput && !isGenerating && (
              <div style={{ ...styles.card, textAlign: "center", padding: "60px" }}>
                <div style={{ fontSize: "48px", marginBottom: "16px" }}>🧠</div>
                <h2 style={{ fontSize: "18px", fontWeight: "600", color: colors.text, marginBottom: "8px" }}>Ready to Generate Strategy</h2>
                <p style={{ color: colors.textMuted, marginBottom: "20px" }}>{qualifierData.company ? `Qualifier for ${qualifierData.company} is ready.` : "Complete a qualifier first."}</p>
                {qualifierData.company ? <button style={styles.button("primary")} onClick={generateStrategy}><Icons.Zap /> Generate Strategy</button> : <button style={styles.button("primary")} onClick={() => navigate("qualifier", "new")}><Icons.Plus /> Start Qualifier</button>}
              </div>
            )}

            {isGenerating && !strategyOutput && (
              <div style={{ ...styles.card, textAlign: "center", padding: "60px" }}>
                <div style={{ width: "48px", height: "48px", border: `3px solid ${colors.border}`, borderTopColor: colors.accent, borderRadius: "50%", animation: "spin 1s linear infinite", margin: "0 auto 20px" }} />
                <h2 style={{ fontSize: "16px", fontWeight: "600", color: colors.text }}>Generating Strategy...</h2>
              </div>
            )}

            {strategyOutput && (
              <>
                <div style={styles.card}>
                  <div style={styles.cardHeader}><h2 style={styles.cardTitle}>🧠 Partnership Strategy</h2>{qualifierData.company && <span style={styles.badge(colors.primary)}>{qualifierData.company}</span>}</div>
                  <div style={{ fontSize: "14px", lineHeight: "1.7", color: colors.text }} dangerouslySetInnerHTML={{ __html: formatMarkdown(strategyOutput) }} />
                </div>

                {proposalOutput && (
                  <div style={styles.card}>
                    <div style={styles.cardHeader}><h2 style={styles.cardTitle}>📄 Proposal Direction</h2><button style={styles.button("sm")} onClick={generateEmail} disabled={isGenerating}><Icons.Mail /> Generate Email</button></div>
                    <div style={{ fontSize: "14px", lineHeight: "1.7", color: colors.text }} dangerouslySetInnerHTML={{ __html: formatMarkdown(proposalOutput) }} />
                  </div>
                )}

                {emailOutput && (
                  <div style={styles.card}>
                    <div style={styles.cardHeader}><h2 style={styles.cardTitle}>✉️ Outreach Email</h2><button style={styles.button("sm")} onClick={() => navigator.clipboard.writeText(emailOutput)}><Icons.Copy /> Copy</button></div>
                    <div style={{ background: colors.bg, borderRadius: "8px", padding: "20px", fontFamily: "monospace", fontSize: "13px", lineHeight: "1.6", whiteSpace: "pre-wrap", color: colors.text }}>{emailOutput}</div>
                  </div>
                )}
              </>
            )}
          </div>
        </>
      );

      // ============================================================
      // RENDER: PROPERTIES
      // ============================================================
      const renderProperties = () => {
        const filtered = propertyFilter === "all" ? Object.values(PROPERTIES) : Object.values(PROPERTIES).filter(p => p.tier === parseInt(propertyFilter));

        if (selectedProperty) {
          const prop = selectedProperty;
          return (
            <>
              <div style={styles.header}>
                <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                  <button style={{ ...styles.button("secondary"), padding: "8px" }} onClick={() => setSelectedProperty(null)}><Icons.ArrowLeft /></button>
                  <h1 style={styles.headerTitle}>{prop.name}</h1>
                </div>
                <button style={styles.button("primary")} onClick={() => { setSelectedPropertyId(prop.id); navigate("qualifier", "new"); }}><Icons.Plus /> Create Qualifier</button>
              </div>
              <div style={styles.content}>
                <div style={styles.card}>
                  <div style={{ display: "flex", gap: "16px", alignItems: "flex-start", marginBottom: "24px" }}>
                    <span style={{ fontSize: "48px" }}>{prop.emoji}</span>
                    <div>
                      <h2 style={{ fontSize: "24px", fontWeight: "600", color: colors.text, marginBottom: "8px" }}>{prop.name}</h2>
                      <div style={{ display: "flex", gap: "8px" }}>
                        <span style={styles.badge(prop.color)}>{prop.tierName}</span>
                        <span style={styles.badge(colors.primary)}>{prop.attendees}</span>
                      </div>
                    </div>
                  </div>
                  <div style={{ padding: "16px 20px", background: `${prop.color}10`, borderRadius: "10px", borderLeft: `4px solid ${prop.color}`, marginBottom: "24px", fontStyle: "italic", color: colors.text }}>{prop.tagline}</div>
                  <div style={styles.grid2}>
                    {[{ label: "Dates", value: prop.dates }, { label: "Market", value: prop.market }, { label: "Format", value: prop.format }, { label: "Pricing", value: prop.inventory }].map(item => (
                      <div key={item.label} style={{ padding: "16px", background: colors.bg, borderRadius: "8px" }}>
                        <div style={{ fontSize: "11px", textTransform: "uppercase", color: colors.textLight, marginBottom: "4px" }}>{item.label}</div>
                        <div style={{ fontSize: "14px", color: colors.text }}>{item.value}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ marginTop: "24px" }}>
                    <h3 style={{ fontSize: "14px", fontWeight: "600", color: colors.text, marginBottom: "12px" }}>Key Inventory</h3>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: "8px" }}>
                      {prop.keyInventory.map(item => <span key={item} style={{ padding: "6px 12px", background: colors.bg, borderRadius: "6px", fontSize: "13px", color: colors.textMuted, border: `1px solid ${colors.border}` }}>{item}</span>)}
                    </div>
                  </div>
                  <div style={{ marginTop: "24px", padding: "20px", background: `${colors.accent}10`, borderRadius: "10px", borderLeft: `4px solid ${colors.accent}` }}>
                    <h3 style={{ fontSize: "12px", fontWeight: "600", color: colors.accent, textTransform: "uppercase", marginBottom: "8px" }}>Why Here</h3>
                    <p style={{ fontSize: "14px", color: colors.text, lineHeight: "1.6" }}>{prop.whyHere}</p>
                  </div>
                </div>
              </div>
            </>
          );
        }

        return (
          <>
            <div style={styles.header}>
              <h1 style={styles.headerTitle}>Property Library</h1>
              <div style={styles.headerActions}>
                <div style={{ display: "flex", gap: "6px" }}>
                  {[{ val: "all", label: "All" }, ...TIERS.map(t => ({ val: String(t.id), label: `T${t.id}` }))].map(f => (
                    <button key={f.val} onClick={() => setPropertyFilter(f.val)} style={{ ...styles.button("secondary"), padding: "6px 12px", fontSize: "12px", background: propertyFilter === f.val ? `${colors.accent}15` : colors.bgCard, borderColor: propertyFilter === f.val ? colors.accent : colors.border, color: propertyFilter === f.val ? colors.accent : colors.textMuted }}>{f.label}</button>
                  ))}
                </div>
              </div>
            </div>
            <div style={styles.content}>
              <div style={styles.grid3}>
                {filtered.map(prop => (
                  <div key={prop.id} style={{ ...styles.card, cursor: "pointer", marginBottom: "0" }} onClick={() => setSelectedProperty(prop)}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "12px" }}>
                      <span style={{ fontSize: "28px" }}>{prop.emoji}</span>
                      <span style={styles.badge(prop.color)}>T{prop.tier}</span>
                    </div>
                    <h3 style={{ fontSize: "15px", fontWeight: "600", color: colors.text, marginBottom: "4px" }}>{prop.name}</h3>
                    <p style={{ fontSize: "13px", color: colors.textMuted, marginBottom: "12px" }}>{prop.market}</p>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontSize: "14px", fontWeight: "600", color: prop.color }}>{prop.attendees}</span>
                      <Icons.ChevronRight />
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </>
        );
      };

      // ============================================================
      // RENDER: PLAYBOOKS
      // ============================================================
      const renderPlaybooks = () => {
        const playbook = PLAYBOOKS[selectedPlaybook];
        return (
          <>
            <div style={styles.header}><h1 style={styles.headerTitle}>Playbooks & Ethos</h1></div>
            <div style={styles.content}>
              <div style={{ display: "flex", gap: "8px", marginBottom: "24px", flexWrap: "wrap" }}>
                {Object.entries(PLAYBOOKS).map(([key, pb]) => (
                  <button key={key} onClick={() => setSelectedPlaybook(key)} style={{ ...styles.button("secondary"), background: selectedPlaybook === key ? `${pb.color}15` : colors.bgCard, borderColor: selectedPlaybook === key ? pb.color : colors.border, color: selectedPlaybook === key ? pb.color : colors.textMuted }}><span style={{ marginRight: "6px" }}>{pb.icon}</span>{pb.title}</button>
                ))}
              </div>
              <div style={styles.card}>
                <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "24px" }}>
                  <span style={{ fontSize: "32px" }}>{playbook.icon}</span>
                  <div><h2 style={{ fontSize: "20px", fontWeight: "600", color: colors.text }}>{playbook.title}</h2><p style={{ fontSize: "13px", color: colors.textMuted }}>Best practices and strategic guidance</p></div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: "16px" }}>
                  {playbook.cards.map((card, i) => (
                    <div key={i} style={{ padding: "20px", background: colors.bg, borderRadius: "10px", borderLeft: `4px solid ${playbook.color}` }}>
                      <div style={{ display: "flex", gap: "12px", alignItems: "flex-start" }}>
                        <span style={{ fontSize: "24px" }}>{card.icon}</span>
                        <div><h3 style={{ fontSize: "14px", fontWeight: "600", color: playbook.color, marginBottom: "8px" }}>{card.title}</h3><p style={{ fontSize: "14px", color: colors.text, lineHeight: "1.6" }}>{card.content}</p></div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </>
        );
      };

      // ============================================================
      // RENDER: OTHER PAGES
      // ============================================================
      const renderProposals = () => (
        <><div style={styles.header}><h1 style={styles.headerTitle}>Proposals</h1></div>
        <div style={styles.content}><div style={{ ...styles.card, textAlign: "center", padding: "60px" }}><div style={{ fontSize: "48px", marginBottom: "16px" }}>📄</div><h2 style={{ fontSize: "18px", fontWeight: "600", color: colors.text, marginBottom: "8px" }}>Proposal Library</h2><p style={{ color: colors.textMuted, marginBottom: "20px" }}>Generated proposals will be saved here.</p>{strategyOutput ? <button style={styles.button("primary")} onClick={() => navigate("strategy")}>View Current Proposal</button> : <button style={styles.button("primary")} onClick={() => navigate("qualifier", "new")}><Icons.Plus /> Start New Qualifier</button>}</div></div></>
      );

      const renderAdmin = () => (
        <><div style={styles.header}><h1 style={styles.headerTitle}>Admin</h1></div>
        <div style={styles.content}><div style={styles.grid2}>
          <div style={styles.card}><h3 style={styles.cardTitle}>👥 User Management</h3><p style={{ color: colors.textMuted, fontSize: "14px", marginTop: "8px" }}>Manage team members and permissions.</p></div>
          <div style={styles.card}><h3 style={styles.cardTitle}>🏢 Property Settings</h3><p style={{ color: colors.textMuted, fontSize: "14px", marginTop: "8px" }}>Update property details and pricing.</p></div>
          <div style={styles.card}><h3 style={styles.cardTitle}>⚙️ Template Settings</h3><p style={{ color: colors.textMuted, fontSize: "14px", marginTop: "8px" }}>Configure strategy templates.</p></div>
          <div style={styles.card}><h3 style={styles.cardTitle}>📊 Reports</h3><p style={{ color: colors.textMuted, fontSize: "14px", marginTop: "8px" }}>Export pipeline reports.</p></div>
        </div></div></>
      );

      // ============================================================
      // RENDER: ONBOARDING MODAL
      // ============================================================
      const renderOnboarding = () => {
        if (!showOnboarding) return null;
        return (
          <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}>
            <div style={{ background: colors.bgCard, borderRadius: "16px", padding: "32px", maxWidth: "520px", width: "90%", position: "relative" }}>
              <button onClick={() => setShowOnboarding(false)} style={{ position: "absolute", top: "16px", right: "16px", background: "none", border: "none", cursor: "pointer", color: colors.textMuted }}><Icons.X /></button>
              <div style={{ textAlign: "center", marginBottom: "24px" }}>
                <div style={{ width: "64px", height: "64px", borderRadius: "16px", background: `linear-gradient(135deg, ${colors.accent}, ${colors.primary})`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", fontSize: "28px", color: "#fff", fontWeight: "800" }}>a21</div>
                <h2 style={{ fontSize: "22px", fontWeight: "600", color: colors.text, marginBottom: "8px" }}>Welcome to the Partnerships Platform</h2>
                <p style={{ color: colors.textMuted, fontSize: "15px", lineHeight: "1.6" }}>Your command center for turning discovery calls into closed deals.</p>
              </div>
              <div style={{ background: colors.bg, borderRadius: "12px", padding: "20px", marginBottom: "24px" }}>
                <h3 style={{ fontSize: "13px", fontWeight: "600", color: colors.accent, textTransform: "uppercase", marginBottom: "16px" }}>Quick Start Guide</h3>
                {[
                  { num: "1", text: "Start a Qualifier after every discovery call" },
                  { num: "2", text: "Select a property or let the system recommend" },
                  { num: "3", text: "Generate Strategy for activation concepts" },
                  { num: "4", text: "Review Proposal Direction for pitch hooks" },
                ].map(step => (
                  <div key={step.num} style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "12px" }}>
                    <div style={{ width: "24px", height: "24px", borderRadius: "50%", background: colors.accent, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "12px", fontWeight: "600" }}>{step.num}</div>
                    <span style={{ fontSize: "14px", color: colors.text }}>{step.text}</span>
                  </div>
                ))}
              </div>
              <button onClick={() => setShowOnboarding(false)} style={{ ...styles.button("primary"), width: "100%", justifyContent: "center", padding: "14px 24px" }}><Icons.Zap /> Get Started</button>
            </div>
          </div>
        );
      };

      // ============================================================
      // MAIN RENDER
      // ============================================================
      return (
        <div style={styles.app}>
          {renderSidebar()}
          <main style={styles.main}>
            {currentPage === "dashboard" && renderDashboard()}
            {currentPage === "qualifier" && renderQualifier()}
            {currentPage === "strategy" && renderStrategy()}
            {currentPage === "proposals" && renderProposals()}
            {currentPage === "properties" && renderProperties()}
            {currentPage === "playbooks" && renderPlaybooks()}
            {currentPage === "admin" && renderAdmin()}
          </main>
          {renderOnboarding()}
        </div>
      );
    }

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<A21Platform />);
  </script>
</body>
</html>
